<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Humanity's Journey to the Stars</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="top-glow"></div>

<div class="container">
  <header>
    <div class="eyebrow">Aerospace Analytics Presentation</div>
    <h1>The Economics of Deep Space</h1>
    <p class="subtitle">
      Launch trends, the rise of private spaceflight, and the cost of exploring the solar system — visualized through data.
    </p>
  </header>


  <div class="dashboard-grid">

    <!-- Chart 1: Launches by Organization -->
    <div class="chart-card full-width">
      <svg id="chart-launches" viewBox="0 0 1240 510"></svg>
    </div>

    <!-- Chart 2: Mission Outcomes -->
    <div class="chart-card full-width">
      <svg id="chart-outcomes" viewBox="0 0 1240 430"></svg>
    </div>

    <!-- Chart 3: Rise of Private Spaceflight -->
    <div class="chart-card full-width">
      <svg id="chart-private" viewBox="0 0 1200 470"></svg>
    </div>

    <!-- Chart 4: Launch Cost Over Time -->
    <div class="chart-card full-width">
      <svg id="chart-costs" viewBox="0 0 1200 510"></svg>
    </div>

    <!-- Chart 5: Power Sources (Sankey) -->
    <div class="chart-card full-width">
      <svg id="chart-sankey" viewBox="0 0 1200 450"></svg>
    </div>

    <!-- Chart 6: Investment by Destination -->
    <div class="chart-card full-width">
      <svg id="chart-total-cost" viewBox="0 0 1200 480"></svg>
    </div>

  </div>

  <footer>
  </footer>
</div>

<!-- tooltips container -->
<div id="tooltip-launches" class="tooltip"></div>
<div id="tooltip-outcomes" class="tooltip"></div>
<div id="tooltip1" class="tooltip"></div>
<div id="tooltip-cost" class="tooltip"></div>
<div id="tooltip3" class="tooltip"></div>
<div id="tooltip5" class="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>

<script src="js/launches_chart.js"></script>
<script src="js/mission_outcomes_chart.js"></script>
<script src="js/chart_private.js"></script>
<script src="js/chart_cost.js"></script>
<script src="js/chart_sankey.js"></script>
<script src="js/chart_investment.js"></script>
<script src="js/app.js"></script>

</body>
</html>
